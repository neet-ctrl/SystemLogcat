name: Debug APK Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        id: build
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: keyboard2-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 90

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          echo "apk_size=$APK_SIZE_MB MB" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: |
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' build.gradle.kts)

          RELEASE_BODY="## 📱 Unexpected Keyboard v$VERSION — Debug Build

          **Release Date:** $DATE

          ### 🐛 Debug Build Info
          - Unobfuscated debug build for testing and development
          - Full stack traces and debug logging enabled
          - All recent commits and changes included

          ### 📦 Package Details
          - **Version:** $VERSION
          - **Build Type:** Debug (unsigned / debug-signed)
          - **File Size:** ${{ steps.apk-info.outputs.apk_size }}
          - **Platform:** Android 7.0+ (API 24+)
          - **Commit:** \`${{ github.sha }}\`

          ### ⚠️ Important Notes
          - This is a **debug** build intended for testing only
          - Enable \"Install from Unknown Sources\" on your device
          - Not recommended for daily use — use the Release build for that

          ### 📥 Installation
          1. Download the APK file below
          2. Enable installation from unknown sources for your browser/file manager
          3. Install and open the keyboard; finish the in-app setup

          ---
          **Repository:** [GitHub](https://github.com/${{ github.repository }})"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-debug
          name: Debug Build ${{ github.run_number }}
          body: ${{ steps.release-notes.outputs.body }}
          files: |
            ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
