name: Build System Console APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v3

    - name: Cache Gradle caches
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Generate debug keystore
      run: |
        keytool -genkeypair -v \
          -keystore debug.keystore \
          -alias debug \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass debug0 \
          -keypass debug0 \
          -dname "CN=Debug, O=Debug, L=Debug, S=Debug, C=US"

    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        DEBUG_KEYSTORE: "debug.keystore"
        DEBUG_KEYSTORE_PASSWORD: debug0
        DEBUG_KEY_ALIAS: debug
        DEBUG_KEY_PASSWORD: debug0

    - name: Verify APK was produced
      run: |
        APK=$(find build/outputs/apk/debug -name "*.apk" | head -1)
        if [ -z "$APK" ]; then echo "ERROR: no APK found!" && exit 1; fi
        echo "Built: $APK" && ls -lh "$APK"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sysconsole-debug
        path: build/outputs/apk/debug/*.apk
        retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate debug keystore
      run: |
        keytool -genkeypair -v \
          -keystore debug.keystore \
          -alias debug \
          -keyalg RSA -keysize 2048 \
          -validity 10000 \
          -storepass debug0 \
          -keypass debug0 \
          -dname "CN=Debug, O=Debug, L=Debug, S=Debug, C=US"

    - name: Run lint
      run: ./gradlew lintDebug --no-daemon
      env:
        DEBUG_KEYSTORE: "debug.keystore"
        DEBUG_KEYSTORE_PASSWORD: debug0
        DEBUG_KEY_ALIAS: debug
        DEBUG_KEY_PASSWORD: debug0
      continue-on-error: true

    - name: Upload lint report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: build/reports/lint-results-debug.html
        retention-days: 7

  security-audit:
    name: Security Auditor File Check
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Verify all Security Auditor source files exist
      run: |
        FILES=(
          "srcs/juloo/sysconsole/ShizukuCommandHelper.java"
          "srcs/juloo/sysconsole/SpyDetectionEngine.java"
          "srcs/juloo/sysconsole/BankingRiskAnalyzer.java"
          "srcs/juloo/sysconsole/NetworkUsageHelper.java"
          "srcs/juloo/sysconsole/DeviceSecurityHelper.java"
          "srcs/juloo/sysconsole/AppInstallReceiver.java"
          "srcs/juloo/sysconsole/SecurityScanManager.java"
          "srcs/juloo/sysconsole/SecurityDashboardActivity.java"
          "srcs/juloo/sysconsole/AppDetailsActivity.java"
          "srcs/juloo/sysconsole/MonitorActivity.java"
          "srcs/juloo/sysconsole/AlertsActivity.java"
          "srcs/juloo/sysconsole/SecuritySettingsActivity.java"
          "srcs/juloo/sysconsole/SecurityReportExporter.java"
          "srcs/juloo/sysconsole/AppSecurityInfo.java"
        )
        ALL_OK=true
        for f in "${FILES[@]}"; do
          if [ -f "$f" ]; then echo "  ✓ $f"
          else echo "  ✗ MISSING: $f" && ALL_OK=false; fi
        done
        $ALL_OK || exit 1

    - name: Verify manifest has required permissions and activities
      run: |
        REQUIRED_PERMS=(
          "android.permission.PACKAGE_USAGE_STATS"
          "android.permission.QUERY_ALL_PACKAGES"
          "android.permission.GET_TASKS"
        )
        REQUIRED_ACTIVITIES=(
          "SecurityDashboardActivity"
          "AppsListActivity"
          "AppDetailsActivity"
          "MonitorActivity"
          "AlertsActivity"
          "SecuritySettingsActivity"
        )
        for p in "${REQUIRED_PERMS[@]}"; do
          grep -q "$p" AndroidManifest.xml \
            && echo "  ✓ $p" \
            || echo "  ✗ Missing permission: $p"
        done
        for a in "${REQUIRED_ACTIVITIES[@]}"; do
          grep -q "$a" AndroidManifest.xml \
            && echo "  ✓ $a" \
            || echo "  ✗ Missing activity: $a"
        done

    - name: Check Shizuku API coverage
      run: |
        echo "ShizukuCommandHelper call sites : $(grep -rn 'ShizukuCommandHelper\.' srcs/ | wc -l)"
        echo "Shizuku.newProcess() calls       : $(grep -rn 'Shizuku.newProcess'   srcs/ | wc -l)"
        echo "SpyDetectionEngine usages        : $(grep -rn 'SpyDetectionEngine\.' srcs/ | wc -l)"
        echo "BankingRiskAnalyzer usages       : $(grep -rn 'BankingRiskAnalyzer\.' srcs/ | wc -l)"
