name: Build APK

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Gradle ──────────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Optional: restore debug keystore from secret ─────────────────────────
      - name: Restore debug keystore
        run: |
          if [[ -n "${{ secrets.DEBUG_KEYSTORE }}" ]]; then
            echo "${{ secrets.DEBUG_KEYSTORE }}" > debug.keystore.asc
            gpg -d --passphrase "debug0" --batch debug.keystore.asc > debug.keystore
            echo "Keystore restored from secrets"
          else
            echo "No DEBUG_KEYSTORE secret found, using default debug key"
          fi

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          DEBUG_KEYSTORE: debug.keystore
          DEBUG_KEYSTORE_PASSWORD: debug0
          DEBUG_KEY_ALIAS: debug
          DEBUG_KEY_PASSWORD: debug0

      # ── Artifact naming ──────────────────────────────────────────────────────
      - name: Set artifact name
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${{ github.ref_name }}"
          REF="${REF//\//-}"
          echo "artifact_name=${REF}-${SHORT_SHA}-debug" >> $GITHUB_ENV

      # ── Upload APK ───────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.artifact_name }}"
          path: build/outputs/apk/debug/*.apk
          if-no-files-found: error
